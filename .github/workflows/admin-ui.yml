name: admin_ui

on:
  push:
    paths:
      - "admin_ui/**"
      - ".github/workflows/admin-ui.yml"
  pull_request:
    paths:
      - "admin_ui/**"
      - ".github/workflows/admin-ui.yml"

defaults:
  run:
    working-directory: admin_ui

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: admin_ui/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run check

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
