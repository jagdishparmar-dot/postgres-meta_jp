# RustFS (S3-compatible) for admin_ui Storage
# Usage from admin_ui/: docker compose -f docker-compose.rustfs.yml up -d
#
# Console: http://localhost:9001
# S3 API:  http://localhost:9000
# Default creds: rustfsadmin / rustfsadmin

services:
  rustfs:
    image: rustfs/rustfs:latest
    container_name: pgadmin-rustfs
    command: ["/data"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ADDRESS: ":9000"
    volumes:
      - rustfs_data:/data
    restart: unless-stopped

volumes:
  rustfs_data:
