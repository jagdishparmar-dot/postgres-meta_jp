# Production compose — admin_ui only.
# Run postgres-meta (db_layer_api) and Postgres on private networks separately.
# See DEPLOYMENT.md

services:
  admin_ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
